# kube/overlays/dev/kustomization.yaml
# Dev environment overlay -- smaller resources, separate namespace
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: paperclip-dev

resources:
  - ../../base

images:
  - name: registry.mareanalytica.com/paperclip
    newTag: latest

patches:
  # Override namespace name for dev
  - target:
      kind: Namespace
      name: paperclip
    patch: |
      - op: replace
        path: /metadata/name
        value: paperclip-dev
      - op: replace
        path: /metadata/labels/environment
        value: dev

  # Override ingress host for dev (wildcard-tls from base applies to all subdomains)
  - target:
      kind: Ingress
      name: paperclip
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: paperclip-dev.mareanalytica.com
      - op: replace
        path: /spec/rules/0/host
        value: paperclip-dev.mareanalytica.com

  # Reduce app deployment resources and fix DB URL for dev namespace
  - target:
      kind: Deployment
      name: paperclip
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: paperclip
      spec:
        template:
          spec:
            containers:
              - name: paperclip
                env:
                  - name: NODE_OPTIONS
                    value: "--max-old-space-size=1536"
                  - name: DATABASE_URL
                    value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@paperclip-db.paperclip-dev.svc.cluster.local:5432/$(POSTGRES_DB)"
                  - name: PAPERCLIP_ALLOWED_HOSTNAMES
                    value: "paperclip-dev.mareanalytica.com"
                  - name: BETTER_AUTH_BASE_URL
                    value: "https://paperclip-dev.mareanalytica.com"
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "50m"
                  limits:
                    memory: "2Gi"
                    cpu: "500m"

  # Reduce PostgreSQL StatefulSet resources for dev
  - target:
      kind: StatefulSet
      name: paperclip-db
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: paperclip-db
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "50m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
