apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    app: paperclip
    app.kubernetes.io/name: paperclip
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-private-only@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - paperclip.mareanalytica.com
      secretName: wildcard-tls
  rules:
    - host: paperclip.mareanalytica.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperclip
                port:
                  number: 3100
