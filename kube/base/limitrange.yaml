apiVersion: v1
kind: LimitRange
metadata:
  name: paperclip-limits
  namespace: paperclip
  labels:
    app: paperclip
    app.kubernetes.io/name: paperclip
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: "8"
        memory: 8Gi
