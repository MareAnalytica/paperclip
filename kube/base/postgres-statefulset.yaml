apiVersion: v1
kind: Service
metadata:
  name: paperclip-db
  namespace: paperclip
  labels:
    app: paperclip
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: postgresql
spec:
  # Headless Service for stable DNS (paperclip-db.paperclip.svc.cluster.local)
  clusterIP: None
  selector:
    app: paperclip-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperclip-db
  namespace: paperclip
  labels:
    app: paperclip-db
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: postgresql
spec:
  serviceName: paperclip-db
  replicas: 1
  selector:
    matchLabels:
      app: paperclip-db
  template:
    metadata:
      labels:
        app: paperclip-db
        app.kubernetes.io/name: paperclip
        app.kubernetes.io/component: postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        # postgres:17-alpine runs as uid 70 (postgres user)
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: paperclip-db-credentials
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
        labels:
          app: paperclip-db
          app.kubernetes.io/name: paperclip
          app.kubernetes.io/component: postgresql
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
