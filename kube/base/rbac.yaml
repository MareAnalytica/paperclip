apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperclip-sa
  namespace: paperclip
  labels:
    app: paperclip
    app.kubernetes.io/name: paperclip
# Disable default SA token auto-mount; we use a projected volume instead
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paperclip-cluster-admin
  labels:
    app: paperclip
    app.kubernetes.io/name: paperclip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: paperclip-sa
    namespace: paperclip
