apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: paperclip

labels:
  - pairs:
      app.kubernetes.io/part-of: paperclip-fleet
    includeSelectors: true

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - limitrange.yaml
  - postgres-statefulset.yaml
  - deployment.yaml
  - ingress.yaml
  - networkpolicies.yaml
